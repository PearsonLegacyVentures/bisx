name: BISX Pulse Imports

on:
  workflow_dispatch:
  schedule:
    - cron: '30 22 * * 1-5'

jobs:
  import:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx prisma generate
      - run: npx prisma db push
      - run: npm run import:all
      - name: Upload sqlite + logs
        uses: actions/upload-artifact@v4
        with:
          name: bisx-pulse-import-artifacts
          path: |
            prisma/*.db
